name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # yakudoc-vscode のテストは node:test の module mocks
        # (--experimental-test-module-mocks, Node 22.3+)に依存する
        node-version: ['22.x', '24.x']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (依存順にビルド。テストは dist を参照するため必須)
        run: npm run build

      - name: Test
        run: npm test
