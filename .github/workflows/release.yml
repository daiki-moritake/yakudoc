name: Release

# v0.1.0 のようなタグを push すると、公開対象パッケージを npm に publish する。
# 事前準備: リポジトリの Secrets に NPM_TOKEN(publish 権限つき)を登録しておく。
# 手順の詳細は RELEASING.md を参照。
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # npm provenance(公開物とソースの対応を証明する署名)に必要
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          # main 含有チェック(merge-base)に履歴が必要
          fetch-depth: 0

      # 誤って main 以外のコミットに打たれたタグからの公開を防ぐ
      - name: Verify tag commit is on main
        run: |
          git fetch origin main --quiet
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::タグのコミットが main に含まれていません。main 上のコミットにタグを打ち直してください。"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Build (依存順にビルド。publish 対象は dist のみ)
        run: npm run build

      - name: Test
        run: npm test

      # yakudoc-core を先頭に、依存される側から順に publish する。
      # 公開済みのバージョンはスキップするため、途中で失敗しても
      # 同じタグでワークフローを再実行すれば続きから公開できる。
      - name: Publish to npm
        run: |
          for pkg in yakudoc-core yakudoc-ts-plugin yakudoc-ai-prep yakudoc-mt; do
            version="$(node -p "require('./packages/${pkg}/package.json').version")"
            if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
              echo "${pkg}@${version} は公開済みのためスキップします"
            else
              npm publish --provenance --access public -w "${pkg}"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
