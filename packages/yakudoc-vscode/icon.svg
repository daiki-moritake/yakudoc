<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Marketplace 用アイコンの原本。icon.png は次で生成する:
       rsvg-convert -w 256 -h 256 icon.svg -o icon.png -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3178c6"/>
      <stop offset="1" stop-color="#5b4fc4"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <text x="64" y="90" font-family="Hiragino Sans, 'Noto Sans CJK JP', sans-serif"
        font-size="74" font-weight="600" fill="#ffffff" text-anchor="middle">訳</text>
</svg>
